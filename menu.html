<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Menu - Coffee Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">☕ CoffeeShop</div>
        
        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </label>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html" class="active">Menu</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
    </header>

   <div class="container">
    <h2 class="page-title">Our Coffee Menu</h2>
    <div class="menu-grid">
        <div class="menu-item">
            <img src="images/espresso.jpeg" alt="espresso">
            <h3>Classic Espresso</h3>
            <p>Rich and bold standalone shot.</p>
            <div class="price">$3.50</div>
        </div>
        <div class="menu-item">
            <img src="images/latte.jpg" alt="Latte">
            <h3>Caffè Latte</h3>
            <p>Creamy steamed milk over espresso layer.</p>
            <div class="price">$4.50</div>
        </div>
        <div class="menu-item">
            <img src="images/cappucino.jpeg" alt="Cappuccino">
            <h3>Cappuccino</h3>
            <p>Perfect balance of espresso, milk, and foam.</p>
            <div class="price">$4.25</div>
        </div>
    </div>
</div>

</html>
